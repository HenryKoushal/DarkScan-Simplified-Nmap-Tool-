{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Verify Certificate</h2>
    <form method="POST" action="{{ url_for('verify_certificate') }}">
        {{ form.hidden_tag() }}
        <div class="form-group">
            {{ form.certificate_hash.label }}
            {{ form.certificate_hash(class="form-control", placeholder="Enter certificate hash") }}
        </div>
        <div class="form-group">
            {{ form.submit(class="btn btn-primary") }}
        </div>
    </form>
</div>
{% endblock %}
